name: Update Gradle Wrapper

on:
  workflow_dispatch:
  
jobs:
  update-gradle-wrapper:

    runs-on: ubuntu-latest

    steps:
      - name: Install JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - uses: actions/checkout@v5
      - name: Update Gradle Wrapper
        uses: gradle-update/update-gradle-wrapper-action@v2
        with:
          merge-method: SQUASH
